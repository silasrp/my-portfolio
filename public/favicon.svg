<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#06060E"/>

  <!-- Corner accent marks -->
  <rect x="2" y="2" width="4" height="1.5" fill="#4AFFC4"/>
  <rect x="2" y="2" width="1.5" height="4" fill="#4AFFC4"/>
  <rect x="26" y="2" width="4" height="1.5" fill="#4AFFC4"/>
  <rect x="28.5" y="2" width="1.5" height="4" fill="#4AFFC4"/>
  <rect x="2" y="28.5" width="4" height="1.5" fill="#4AFFC4"/>
  <rect x="2" y="26" width="1.5" height="4" fill="#4AFFC4"/>
  <rect x="26" y="28.5" width="4" height="1.5" fill="#4AFFC4"/>
  <rect x="28.5" y="26" width="1.5" height="4" fill="#4AFFC4"/>

  <!-- Subtle grid lines -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#4AFFC4" stroke-width="0.3" stroke-opacity="0.12"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#4AFFC4" stroke-width="0.3" stroke-opacity="0.12"/>

  <!-- SP letters -->
  <!-- S -->
  <text
    x="7"
    y="22"
    font-family="'Courier New', monospace"
    font-weight="700"
    font-size="14"
    fill="#4AFFC4"
    letter-spacing="-0.5"
  >SP</text>

  <!-- Tiny underline accent -->
  <rect x="7" y="24" width="18" height="1" fill="#4AFFC4" opacity="0.5"/>
</svg>
